# gitleaks config for cloak-squads
# Extends the default ruleset; adds project-specific allowlists.
# Docs: https://github.com/gitleaks/gitleaks/blob/master/README.md#configuration

[extend]
useDefault = true

[allowlist]
description = "Project-wide allowlist for known non-secrets"

# Paths that contain reference material or third-party content, never project secrets.
# F-014 (audit Pass 3): the previous version allow-listed all `tests/**/*.test.ts`,
# which would have masked a real future leak in a test file. Removed.
# Test fixtures are kept allowlisted via regex below instead.
paths = [
  '''^\.auditor/''',                       # cloned solanabr/Auditor corpus (reference checklists)
  '''^docs/security/reports/''',           # local-only audit reports (gitignored anyway, belt+suspenders)
  '''^docs/superpowers/specs/''',          # historical design docs with pseudocode (e.g. token_mint_32 || ... identifiers)
  '''^pnpm-lock\.yaml$''',
  '''^Cargo\.lock$''',
  '''^target/''',
  '''^node_modules/''',
  '''^\.next/''',
  '''^apps/web/\.next/''',
]

# Strings that look secret-y but are deliberately public identifiers or
# clearly-labelled test fixtures. Anything matching these patterns is
# considered NOT a secret — keep this list short and explicit.
# F-014 (audit Pass 3): regex-scoped rather than path-allowlisted so a
# REAL leak in any test file (e.g., a pasted live key) is still caught.
regexes = [
  '''AgFx8yS8bQnXSCSGfN3f8oz3HJGeF5rwLoWtfHTEEaAq''',  # Anchor declare_id! for cloak-gatekeeper
  '''test-[a-z0-9-]*(secret|key|hmac|hash|chars|crypto|session|field|audit)[a-z0-9!-]*''',  # tests/*.test.ts env fixtures
  '''passphrase:test-[a-z0-9-]+''',                                  # AUDIT_EXPORT_SIGN_KEY test prefix (Pass 2 F-103)
]

# Commits that have been triaged and accepted (e.g., known leaks already handled).
# IMPORTANT: if you list a leak here, it must be fully decommissioned (keys rotated, multisig burned).
commits = [
  "a8bff681a70004d9b328e8790492180c4c5df3dc",  # 2026-04-29 demo-cofre-2ofn keypair leak — see docs/security/reports/2026-05-11-secrets.md; multisig 2b7mF6Q... decommissioned
]
