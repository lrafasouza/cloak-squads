services:
  - type: web
    name: aegis-web
    runtime: node
    plan: starter
    # Liveness + readiness probe. Returns 200 when DB is reachable; 503
    # when DB is hard-failing. Redis is degraded-tolerant (a transient
    # blip won't restart the pod). See apps/web/app/api/health/route.ts.
    healthCheckPath: /api/health
    buildCommand: |
      npm install -g pnpm@9.12.0
      pnpm install --frozen-lockfile
      pnpm -F @cloak-squads/core build
      cd apps/web && pnpm prisma generate && pnpm next build
    startCommand: cd apps/web && npx prisma migrate deploy && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SOLANA_CLUSTER
        value: devnet
      # Helius RPC. Set values in the Render dashboard (sync: false keeps the
      # api-key out of git). Format:
      #   https://devnet.helius-rpc.com/?api-key=YOUR_KEY
      #   wss://devnet.helius-rpc.com/?api-key=YOUR_KEY
      - key: NEXT_PUBLIC_RPC_URL
        sync: false
      - key: NEXT_PUBLIC_RPC_WS_URL
        sync: false
      - key: FALLBACK_RPC_URL
        sync: false
      - key: NEXT_PUBLIC_CLOAK_PROGRAM_ID
        value: Zc1kHfp4rajSMeASFDwFFgkHRjv7dFQuLheJoQus27h
      - key: NEXT_PUBLIC_CLOAK_RELAY_URL
        value: https://api.devnet.cloak.ag
      - key: NEXT_PUBLIC_GATEKEEPER_PROGRAM_ID
        value: AgFx8yS8bQnXSCSGfN3f8oz3HJGeF5rwLoWtfHTEEaAq
      - key: NEXT_PUBLIC_SQUADS_PROGRAM_ID
        value: SQDS4ep65T869zMMBKyuUq6aD6EgTu8psMjkvj52pCf
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: aegis-db
          property: connectionString
      # ── Crypto keys ─────────────────────────────────────────────────
      # JWT_SIGNING_SECRET removed 2026-05-13 (audit Pass 3 F-010). The
      # runtime crypto helpers no longer read it; auto-generating a value
      # for a deprecated env was hardening drift. If a mid-migration
      # rollback ever needs it, set the value manually in the dashboard.
      # HMAC key for stateless tokens (session cookie + claim challenge).
      # Each call site domain-separates further (`session-hmac-v1:`,
      # `challenge-hmac-v1:`) so they're cryptographically distinct.
      - key: SESSION_HMAC_KEY
        generateValue: true
      # AES-256-GCM key for `field-crypto` (memos, UTXO secrets, operator
      # deposit cache). Rotating mid-flight requires the rotate-field-crypto
      # script + `FIELD_CRYPTO_KEY_PREVIOUS` env in dual-read mode.
      - key: FIELD_CRYPTO_KEY
        generateValue: true
      # Optional dual-read fallback during a FIELD_CRYPTO_KEY rotation. Leave
      # unset under steady state. Set in the dashboard during rotation,
      # remove after the rotate-field-crypto script completes.
      - key: FIELD_CRYPTO_KEY_PREVIOUS
        sync: false
      # Ed25519 signing seed for audit-export signatures. audit-sign.ts
      # requires an explicit scheme prefix (audit Pass 2 F-103 — bare
      # values caused ambiguous parsing):
      #   - "base64:<44-char seed>" — strict 32-byte base64 (preferred)
      #   - "passphrase:<>=16 chars>" — SHA-256-hashed deterministic seed
      # Render's generateValue produces an unprefixed string. After first
      # deploy following the F-103 fix, the operator MUST edit this env in
      # the Render dashboard to prepend `passphrase:` to the existing
      # value (preserves the signing keypair so historical exports stay
      # verifiable) OR replace with a freshly generated `base64:<seed>`
      # (rotates — old exports remain verifiable via embedded publicKey).
      # Migration one-liner that keeps the existing keypair:
      #   node -e "console.log('passphrase:' + process.env.OLD)"  # where OLD is the bare value
      - key: AUDIT_EXPORT_SIGN_KEY
        sync: false
      # F-503 (audit Pass 5): REDIS_URL is mandatory in production.
      # `apps/web/lib/env.ts` rejects the env on missing REDIS_URL and
      # `instrumentation.ts` `process.exit(1)`s — without this entry the
      # first deploy boots into a restart loop. The actual value must be
      # set in the Render dashboard (Upstash Redis is the typical choice).
      # If REDIS_URL is a TLS endpoint with token-in-URL, REDIS_TOKEN may
      # be unused but is declared for parity with the env schema.
      - key: REDIS_URL
        sync: false
      - key: REDIS_TOKEN
        sync: false
      # F-504 (audit Pass 5): absolute origin used to build the Report-To
      # CSP endpoint URL. Set to the production host (custom domain when
      # configured, render.com hostname otherwise).
      - key: APP_ORIGIN
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      # Optional Sentry (audit-recommended observability). Leave unset until
      # `@sentry/nextjs` is installed and the operator has a project DSN.
      # apps/web/lib/sentry.ts gracefully degrades to a no-op without either.
      - key: SENTRY_DSN
        sync: false
      - key: SENTRY_TRACES_SAMPLE_RATE
        sync: false

databases:
  - name: aegis-db
    plan: free
    databaseName: aegis
    user: aegis
