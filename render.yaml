services:
  - type: web
    name: aegis-web
    runtime: node
    plan: starter
    buildCommand: |
      npm install -g pnpm@9.12.0
      pnpm install --frozen-lockfile
      pnpm -F @cloak-squads/core build
      cd apps/web && pnpm prisma generate && pnpm next build
    startCommand: cd apps/web && npx prisma migrate deploy && pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_SOLANA_CLUSTER
        value: devnet
      # Helius RPC. Set values in the Render dashboard (sync: false keeps the
      # api-key out of git). Format:
      #   https://devnet.helius-rpc.com/?api-key=YOUR_KEY
      #   wss://devnet.helius-rpc.com/?api-key=YOUR_KEY
      - key: NEXT_PUBLIC_RPC_URL
        sync: false
      - key: NEXT_PUBLIC_RPC_WS_URL
        sync: false
      - key: FALLBACK_RPC_URL
        sync: false
      - key: NEXT_PUBLIC_CLOAK_PROGRAM_ID
        value: Zc1kHfp4rajSMeASFDwFFgkHRjv7dFQuLheJoQus27h
      - key: NEXT_PUBLIC_CLOAK_RELAY_URL
        value: https://api.devnet.cloak.ag
      - key: NEXT_PUBLIC_GATEKEEPER_PROGRAM_ID
        value: AgFx8yS8bQnXSCSGfN3f8oz3HJGeF5rwLoWtfHTEEaAq
      - key: NEXT_PUBLIC_SQUADS_PROGRAM_ID
        value: SQDS4ep65T869zMMBKyuUq6aD6EgTu8psMjkvj52pCf
      - key: LOG_LEVEL
        value: info
      - key: DATABASE_URL
        fromDatabase:
          name: aegis-db
          property: connectionString
      # ── Crypto keys ─────────────────────────────────────────────────
      # JWT_SIGNING_SECRET is the legacy single-secret for sessions, field
      # crypto, audit signatures and claim challenges. The three vars below
      # are purpose-specific — set explicitly so a leak in one subsystem
      # does NOT compromise the other three. JWT_SIGNING_SECRET stays as a
      # backward-compat fallback during the migration window.
      - key: JWT_SIGNING_SECRET
        generateValue: true
      # HMAC key for stateless tokens (session cookie + claim challenge).
      # Each call site domain-separates further (`session-hmac-v1:`,
      # `challenge-hmac-v1:`) so they're cryptographically distinct.
      - key: SESSION_HMAC_KEY
        generateValue: true
      # AES-256-GCM key for `field-crypto` (memos, UTXO secrets, operator
      # deposit cache). Rotating mid-flight requires the rotate-field-crypto
      # script + `FIELD_CRYPTO_KEY_PREVIOUS` env in dual-read mode.
      - key: FIELD_CRYPTO_KEY
        generateValue: true
      # Optional dual-read fallback during a FIELD_CRYPTO_KEY rotation. Leave
      # unset under steady state. Set in the dashboard during rotation,
      # remove after the rotate-field-crypto script completes.
      - key: FIELD_CRYPTO_KEY_PREVIOUS
        sync: false
      # Ed25519 signing seed (32 bytes, base64) for audit-export signatures.
      # `generateValue` produces a random hex string; the audit-sign helper
      # derives a 32-byte seed via SHA-256 if the env is not literally a
      # base64-encoded 32-byte seed (current behavior — see audit-sign.ts).
      # For a true 32-byte seed, generate manually:
      #   node -e "console.log(require('crypto').randomBytes(32).toString('base64'))"
      - key: AUDIT_EXPORT_SIGN_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false

databases:
  - name: aegis-db
    plan: free
    databaseName: aegis
    user: aegis
