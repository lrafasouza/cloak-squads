name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# F-006 (audit Pass 3): minimum-privilege default. Jobs override per-step
# if they need anything beyond reading the source tree.
permissions:
  contents: read

jobs:
  gitleaks:
    name: Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read   # gitleaks-action posts a check status; no comments
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0   # full history so PR scans can diff
      # gitleaks/gitleaks-action@v2.3.7
      - uses: gitleaks/gitleaks-action@83373cf2f8c4db6e24b41c1a9b086bb9619e9cd3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rust-audit:
    name: Rust Supply-Chain (cargo-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # rustsec/audit-check@v2.0.0 — scans Cargo.lock against the
      # RustSec Advisory Database. Fails on known vulns. F-002 (Pass 3).
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # pnpm/action-setup@v3.0.0
      - uses: pnpm/action-setup@e9540b3eafaf84907c087a645d3258bfaa861427
        with:
          version: 9

      # actions/setup-node@v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm prebuild:web

      - name: Unit tests
        run: pnpm test:unit

  integration-tests:
    name: Integration Tests (Anchor)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # actions/checkout@v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      # pnpm/action-setup@v3.0.0
      - uses: pnpm/action-setup@e9540b3eafaf84907c087a645d3258bfaa861427
        with:
          version: 9

      # actions/setup-node@v4.4.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm

      - name: Set up stable Rust
        run: |
          rustup update stable
          rustup default stable
          rustup component add rustfmt clippy

      # Swatinem/rust-cache@v2.7.7
      - name: Cache Rust/Cargo
        uses: Swatinem/rust-cache@400e7407cfd7a091e5fbb6afec01ec146c432b7c
        with:
          workspaces: . -> target

      - name: Install Solana CLI (Anza)
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"

      - name: Verify cargo-build-sbf is available
        run: |
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          solana --version
          cargo-build-sbf --version

      - name: Install Anchor CLI
        run: cargo install --version 0.31.1 anchor-cli --locked
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: true

      - name: Build Anchor programs
        run: |
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          anchor build

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Integration tests
        run: pnpm test:int
